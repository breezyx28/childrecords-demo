name: Deploy to kat-jr.com

on:
  push:
    branches:
      - master
      - production

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (Vite)
        run: npm run build

      - name: Clear old build on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 20m
          script: |
            set -e
            WEB_ROOT="/var/www/html/childrecord"
            sudo mkdir -p "$WEB_ROOT"
            sudo rm -rf "${WEB_ROOT:?}/"*

      - name: Copy dist folder to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          timeout: 60s
          source: dist
          target: /var/www/html/childrecord

      - name: Flatten dist into web root
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 20m
          script: |
            set -e
            WEB_ROOT="/var/www/html/childrecord"
            DIST_DIR="$WEB_ROOT/dist"

            if [ -d "$DIST_DIR" ]; then
              # Move build contents up one level
              sudo cp -r "$DIST_DIR/." "$WEB_ROOT"
              # Remove the now-empty dist directory
              sudo rm -rf "$DIST_DIR"
            fi

