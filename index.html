<!DOCTYPE html>
<html lang="en" class="overflow-x-hidden max-w-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- Primary Meta -->
    <title>Child Records – Track Your Child's Growth & Milestones</title>
    <meta name="description" content="Child Records helps parents track their child's development, growth charts, milestones, and health records in one place. Monitor height, weight, and developmental progress." />
    <meta name="author" content="Child Records" />
    <meta name="keywords" content="child development, growth chart, milestones, child health, parenting, baby tracker, child records" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#4F46E5" />

    <!-- Canonical (set dynamically per route in app or use base URL) -->
    <link rel="canonical" href="https://childrecords.care/" />

    <!-- Favicons (favicon.ico first so browser tab uses it) -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="/assets/logos/logo-icon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/logos/logo-icon.svg" />

    <!-- Web App Manifest -->
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Child Records" />
    <meta property="og:title" content="Child Records – Track Your Child's Growth & Milestones" />
    <meta property="og:description" content="Track your child's development, growth charts, milestones, and health records. One place for height, weight, and developmental progress." />
    <meta property="og:url" content="https://childrecords.care/" />
    <meta property="og:image" content="https://childrecords.care/assets/logos/logo-icon.svg" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Child Records – Track Your Child's Growth & Milestones" />
    <meta name="twitter:description" content="Track your child's development, growth charts, milestones, and health records in one place." />
    <meta name="twitter:image" content="https://childrecords.care/assets/logos/logo-icon.svg" />

    <!-- Google Site Verification -->
    <!-- <meta name="google-site-verification" content="lOwzWFefOzez5j3RVwNvDNRN4KetsO_-qWH95VX7IIE" /> -->

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <style>
      :root { --font-nunito: 'Nunito', sans-serif; }
    </style>
  </head>
  <body class="overflow-x-hidden bg-gradient max-w-full min-w-0" style="font-family: var(--font-nunito); margin: 0 auto; max-width: 1800px;" suppressHydrationWarning>
    <div id="root" class="min-w-0"></div>
    <script src="https://cdn.lordicon.com/lordicon.js"></script>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
